# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
name: Generate Bicep types for AWS

on:
  workflow_dispatch:
    inputs: {}

jobs:
  generate-types:
    name: Generate Bicep types for AWS
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read # Required for actions/checkout and actions/create-github-app-token
    env:
      GOVER: ^1.26
      GOPROXY: https://proxy.golang.org
      AWS_REGION: us-west-2
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Get commit hash (radius-project/bicep-types-aws)
        id: get_commit_hash
        run: |
          echo "commit_hash_short=$(git rev-parse HEAD --short)" >> "${GITHUB_OUTPUT}"

      - name: Get date string
        id: get_date_string
        run: |
          echo "date_string=$(date +'%Y-%m-%d')" >> "${GITHUB_OUTPUT}"

      - name: Generate branch name
        id: generate_branch_name
        run: |
          echo "branch_name=generate-types-${{ steps.get_date_string.outputs.date_string }}-${{ steps.get_commit_hash.outputs.commit_hash_short }}" >> "${GITHUB_OUTPUT}"

      - name: Configure AWS
        run: |
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws configure set region ${{ env.AWS_REGION }}
          aws configure set output json

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GOVER }}

      - name: Install node and npm
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Init bicep-types submodule
        run: |
          git submodule update --init --recursive

      - name: Build bicep-types
        run: |
          pushd ./bicep-types/src/bicep-types
          npm ci
          npm run build
          popd

      - name: Download AWS types
        run: |
          pushd ./src/aws-type-downloader
          go run main.go --output ../../artifacts/types --clean
          popd

      - name: Generate AWS Bicep types
        run: |
          pushd ./src/aws-type-generator
          npm ci
          npm run start -- --input ../../artifacts/types --output ../../artifacts/bicep
          popd

      - name: Generate reference documentation
        run: |
          python ./.github/scripts/generate-reference-docs.py ./artifacts/types ./docs/reference/supported-resources.md

      # Generate a short-lived installation token scoped to this repository.
      # Requires the RADIUS_TYPES_BOT GitHub App installed on
      # radius-project/bicep-types-aws with the minimal permissions:
      #   Contents: Read & Write, Pull requests: Read & Write
      - name: Get App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RADIUS_TYPES_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RADIUS_TYPES_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: write
          permission-pull-requests: write
          repositories: bicep-types-aws

      # Resolve the bot's GitHub-formatted name and email dynamically from the
      # app slug so commits are attributed to the bot identity rather than
      # hardcoded values.
      - name: Get bot details
        id: bot-details
        uses: raven-actions/bot-details@ee8966a9ff6e7e42cbfc4a56b4ddb60a9d1b40a6 # v1.2.0
        with:
          bot-slug-name: ${{ steps.app-token.outputs.app-slug }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          committer: ${{ steps.bot-details.outputs.name-email }}
          author: ${{ steps.bot-details.outputs.name-email }}
          signoff: true
          branch: ${{ steps.generate_branch_name.outputs.branch_name }}
          delete-branch: true
          title: |
            Generate bicep types for AWS: ${{ steps.get_date_string.outputs.date_string }}
          body: |
            ## Autogenerated Report
            - Downloaded AWS types from AWS Cloudcontrol on ${{ steps.get_date_string.outputs.date_string }}
            - Generated Bicep types from AWS types
            - Updated reference documentation
          commit-message: |
            Update Bicep types for AWS: ${{ steps.get_date_string.outputs.date_string }}
          labels: |
            autogenerated
            github_actions
            aws-types
          draft: false
