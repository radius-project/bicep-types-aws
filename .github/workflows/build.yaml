# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
name: Build and test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: src/aws-type-downloader/go.mod
          cache-dependency-path: src/aws-type-downloader/go.sum

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Build aws-type-downloader
        env:
          GOPROXY: https://proxy.golang.org
        working-directory: src/aws-type-downloader
        run: go build .

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: latest
          working-directory: src/aws-type-downloader

      - run: git submodule update --init --recursive

      - run: npm ci
        working-directory: bicep-types/src/bicep-types

      - run: npm run build
        working-directory: bicep-types/src/bicep-types

      - run: npm ci
        working-directory: src/aws-type-generator

      - run: npm run build
        working-directory: src/aws-type-generator

      - run: npm test
        working-directory: src/aws-type-generator
