# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
name: Build and test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: src/aws-type-downloader/go.mod
          cache-dependency-path: src/aws-type-downloader/go.sum

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Build aws-type-downloader
        env:
          GOPROXY: https://proxy.golang.org
        working-directory: src/aws-type-downloader
        run: go build .

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: latest
          working-directory: src/aws-type-downloader

      - run: git submodule update --init --recursive

      - run: npm ci
        working-directory: bicep-types/src/bicep-types

      - run: npm run build
        working-directory: bicep-types/src/bicep-types

      - run: npm ci
        working-directory: src/aws-type-generator

      - run: npm run build
        working-directory: src/aws-type-generator

      - run: npm test
        working-directory: src/aws-type-generator
